<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Circuito Digital - Medidor de Temperatura</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e9eef3;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .circuito {
            background: #fff;
            padding: 25px 35px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        .sensor {
            margin: 15px 0;
        }

        input[type="range"] {
            width: 100%;
        }

        .display {
            font-size: 28px;
            margin: 15px 0;
            font-weight: bold;
        }

        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            color: #fff;
            font-weight: bold;
        }

        .frio {
            background: #3498db;
        }

        .normal {
            background: #2ecc71;
        }

        .quente {
            background: #e74c3c;
        }

        .binario {
            margin-top: 15px;
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div class="circuito">
    <h2>Medidor Digital de Temperatura</h2>

    <div class="sensor">
        <label>Sensor de Temperatura (0°C a 100°C)</label>
        <input type="range" id="temp" min="0" max="100" value="25">
    </div>

    <div class="display">
        <span id="valorTemp">25</span> °C
    </div>

    <div id="status" class="status normal">
        Temperatura Normal
    </div>

    <div class="binario">
        Saída Digital (Binário): <span id="binario">00011001</span>
    </div>
</div>

<script>
    const temp = document.getElementById("temp");
    const valorTemp = document.getElementById("valorTemp");
    const status = document.getElementById("status");
    const binario = document.getElementById("binario");

    function atualizarCircuito() {
        const temperatura = parseInt(temp.value);
        valorTemp.textContent = temperatura;

        // Conversão para binário (8 bits)
        binario.textContent = temperatura.toString(2).padStart(8, "0");

        // Lógica do circuito (comparadores digitais)
        if (temperatura < 20) {
            status.textContent = "Temperatura Baixa";
            status.className = "status frio";
        } else if (temperatura <= 35) {
            status.textContent = "Temperatura Normal";
            status.className = "status normal";
        } else {
            status.textContent = "Temperatura Alta";
            status.className = "status quente";
        }
    }

    temp.addEventListener("input", atualizarCircuito);
</script>

</body>
</html>
